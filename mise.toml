[tools]
go = "1.26.4"
bun = "1.3.14"
java = "temurin-25.0.3+9.0.LTS"
"go:github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen" = "2.7.1"

[env]
# Build metadata, computed once here and inherited by every task so the values
# are never recomputed in individual scripts. Values already present in the
# environment (e.g. Docker build args, where .git is unavailable) take
# precedence over the git fallback. VERSION also names the produced artifacts
# (binary, OCI archive, image tags).
VERSION = "{{ get_env(name='VERSION', default=exec(command='git describe --tags --always --abbrev=0 --dirty=-dev 2>/dev/null || echo dev')) }}"
COMMIT = "{{ get_env(name='COMMIT', default=exec(command='git rev-parse --short HEAD 2>/dev/null || echo none')) }}"
BUILD_TIME = "{{ get_env(name='BUILD_TIME', default=exec(command='date -u +%Y-%m-%dT%H:%M:%SZ')) }}"

[tasks."api:generate"]
description = "Generate Go code from OpenAPI specification using oapi-codegen."
run = 'oapi-codegen -config api/oapi-codegen.yaml api/openapi.yaml'

[tasks."api:test:unit"]
description = "Run unit tests for the API."
run = "go test -v -cover -race ./internal/..."

[tasks."api:test:integration"]
description = "Run integration tests against the test-profile Postgres and Redis."
# Brings up the test stack first; tear it down afterwards with compose:test:down.
depends = ["compose:test:up"]
depends_post = ["compose:test:down"]
run = "go test -cover -race -v -count=1 -tags=integration ./internal/..."

[tasks."api:lint"]
tools = { golangci-lint = "2.12.2" }
description = "Run golangci-lint on the API code."
run = "golangci-lint run -v ./internal/..."

[tasks."api:vulncheck"]
tools = { "go:golang.org/x/vuln/cmd/govulncheck" = "latest" }
description = "Scan Go code and dependencies for known vulnerabilities."
run = "govulncheck -show verbose ./..."

[tasks."api:format"]
tools = { golangci-lint = "2.12.2" }
description = "Format the API code using golangci-lint."
run = "golangci-lint run -v ./internal/... --fix"

[tasks."web:install"]
description = "Install frontend dependencies."
dir = "web"
run = "bun install"

[tasks."web:generate"]
description = "Generate the TypeScript API client from the OpenAPI spec."
dir = "web"
depends = ["web:install"]
run = "bun run generate"

[tasks."web:build"]
description = "Build the frontend SPA bundle (embedded into the API binary)."
dir = "web"
depends = ["web:generate"]
run = "bun run build"

[tasks."web:dev"]
description = "Run the frontend dev server with API proxy."
dir = "web"
run = "bun run dev"

[tasks."web:lint"]
description = "Lint the frontend code with ESLint."
dir = "web"
depends = ["web:install"]
run = "bun run lint"

[tasks."web:format"]
description = "Format the frontend code with Prettier."
dir = "web"
depends = ["web:install"]
run = "bun run fmt"

[tasks."web:format:check"]
description = "Check frontend formatting with Prettier."
dir = "web"
depends = ["web:install"]
run = "bun run fmt:check"

[tasks."web:check"]
description = "Run svelte-check on the frontend code."
dir = "web"
depends = ["web:install"]
run = "bun run check"

[tasks."web:test"]
description = "Run frontend unit tests with Vitest."
dir = "web"
depends = ["web:install"]
run = "bun run test"

[tasks."api:run"]
description = "Run the API server."
depends = ["api:build"]
# exec replaces the wrapping shell with the binary so a terminal Ctrl-C
# (group SIGINT) is delivered straight to the server, which drains and exits
# 0. Without exec the shell itself reports the interrupt as exit 130.
run = "exec bin/devopsbin run"

[tasks."compose:dev:up"]
description = "Start the Docker Compose services."
# VERSION/COMMIT/BUILD_TIME come from the global [env] section and are
# interpolated by compose.yaml into the Docker build args.
run = "docker compose --profile dev up -d --wait --build"

[tasks."compose:dev:down"]
description = "Stop the Docker Compose services."
run = "docker compose --profile dev down -v"

[tasks."ruff:dev"]
description = "Run ruff linter on the codebase."
tools = { ruff = "0.15.16" }
run = "ruff format mise/tasks/ && ruff check mise/tasks/"

[tasks."shellcheck:dev"]
description = "Run shellcheck on the bash file tasks and shared libs."
tools = { shellcheck = "0.11.0" }
# File tasks have no extension, so enumerate them by their bash shebang and add
# the sourced *.sh libs. -x lets shellcheck follow the `source` directives.
run = "shellcheck -x mise/lib/*.sh $(grep -rlE '^#!.*bash' mise/tasks)"

[tasks."compose:test:up"]
description = "Start the Docker Compose services for testing."
run = "docker compose --profile test up -d --wait"

[tasks."compose:test:down"]
description = "Stop the Docker Compose services for testing."
run = "docker compose --profile test down -v"
