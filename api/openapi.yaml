openapi: 3.0.3
info:
  title: DevOpsBin API
  version: 0.1.0
  description: Minimal OpenAPI starter spec for DevOpsBin runtime endpoints.

servers:
  - url: /api/v1
    description: API v1 base path

tags:
  - name: Runtime
    description: Runtime, health probe, and build metadata endpoints.
  - name: Inspect
    description: Request-reflection endpoints that echo back details of the incoming request.
  - name: Status
    description: Endpoints that return a caller-specified HTTP status code.
  - name: Latency
    description: Endpoints that introduce an artificial, bounded response delay.
  - name: Auth
    description: >
      Cookie-session authentication: registration, login, logout, and the
      current-session probe. State-changing requests on authenticated routes
      require a session cookie and a matching X-CSRF-Token header (double-submit
      CSRF protection).
  - name: Admin
    description: >
      Role-restricted administration endpoints. They require a valid session
      whose user has the `admin` role; non-admins receive a 403. State-changing
      requests also require a matching X-CSRF-Token header.
  - name: Database
    description: >
      Authenticated database-transaction demos. Any logged-in user may list
      accounts and transfer funds between them. Transfers run inside a single
      transaction at a configurable isolation level (serializable by default)
      and retry automatically on serialization conflicts, demonstrating
      atomicity, isolation, and authorization. State-changing requests require a
      matching X-CSRF-Token header.

paths:
  /livez:
    get:
      operationId: getLivez
      tags:
        - Runtime
      summary: Liveness probe
      description: Process-only liveness check. Do not check PostgreSQL or Redis here.
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivezResponse"

  /readyz:
    get:
      operationId: getReadyz
      tags:
        - Runtime
      summary: Readiness probe
      description: Checks whether the application is ready to receive traffic.
      responses:
        "200":
          description: Application is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"
        "503":
          description: Application is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"

  /startupz:
    get:
      operationId: getStartupz
      tags:
        - Runtime
      summary: Startup probe
      description: Checks whether application startup has completed.
      responses:
        "200":
          description: Application startup is complete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupzResponse"
        "503":
          description: Application startup is still in progress.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartupzResponse"

  /version:
    get:
      operationId: getVersion
      tags:
        - Runtime
      summary: Build and version metadata
      responses:
        "200":
          description: Version metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /uuid:
    get:
      operationId: getUuid
      tags:
        - Inspect
      summary: Generate a random UUID
      description: Returns a randomly generated version 4 UUID.
      responses:
        "200":
          description: A random UUIDv4.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UuidResponse"

  /ip:
    get:
      operationId: getIp
      tags:
        - Inspect
      summary: Return the caller's IP address
      description: Returns the origin IP address of the incoming request.
      responses:
        "200":
          description: The caller's origin IP address.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpResponse"

  /headers:
    get:
      operationId: getHeaders
      tags:
        - Inspect
      summary: Echo the request headers
      description: Returns the HTTP headers received with the request.
      responses:
        "200":
          description: The request headers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeadersResponse"

  /user-agent:
    get:
      operationId: getUserAgent
      tags:
        - Inspect
      summary: Echo the User-Agent header
      description: Returns the User-Agent header received with the request.
      responses:
        "200":
          description: The request User-Agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAgentResponse"

  /scheme:
    get:
      operationId: getScheme
      tags:
        - Inspect
      summary: Return the request scheme
      description: >
        Returns the scheme (http or https) of the incoming request. When the
        request arrives through a trusted proxy, the scheme is taken from the
        X-Forwarded-Proto header; otherwise it reflects whether this server
        terminated TLS for the connection.
      responses:
        "200":
          description: The request scheme.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchemeResponse"

  /echo:
    get:
      operationId: getEcho
      tags:
        - Inspect
      summary: Echo the incoming request
      description: >
        Returns details of the incoming request: HTTP method, path, query
        parameters, headers, origin IP address, and scheme.
      responses:
        "200":
          description: A reflection of the incoming request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EchoResponse"
    post:
      operationId: postEcho
      tags:
        - Inspect
      summary: Echo the incoming request
      description: >
        Returns details of the incoming request: HTTP method, path, query
        parameters, headers, origin IP address, scheme, and request body.
      requestBody:
        $ref: "#/components/requestBodies/EchoBody"
      responses:
        "200":
          $ref: "#/components/responses/EchoReflection"
        "413":
          $ref: "#/components/responses/EchoBodyTooLarge"
    put:
      operationId: putEcho
      tags:
        - Inspect
      summary: Echo the incoming request
      description: >
        Returns details of the incoming request: HTTP method, path, query
        parameters, headers, origin IP address, scheme, and request body.
      requestBody:
        $ref: "#/components/requestBodies/EchoBody"
      responses:
        "200":
          $ref: "#/components/responses/EchoReflection"
        "413":
          $ref: "#/components/responses/EchoBodyTooLarge"
    patch:
      operationId: patchEcho
      tags:
        - Inspect
      summary: Echo the incoming request
      description: >
        Returns details of the incoming request: HTTP method, path, query
        parameters, headers, origin IP address, scheme, and request body.
      requestBody:
        $ref: "#/components/requestBodies/EchoBody"
      responses:
        "200":
          $ref: "#/components/responses/EchoReflection"
        "413":
          $ref: "#/components/responses/EchoBodyTooLarge"
    delete:
      operationId: deleteEcho
      tags:
        - Inspect
      summary: Echo the incoming request
      description: >
        Returns details of the incoming request: HTTP method, path, query
        parameters, headers, origin IP address, scheme, and request body.
      requestBody:
        $ref: "#/components/requestBodies/EchoBody"
      responses:
        "200":
          $ref: "#/components/responses/EchoReflection"
        "413":
          $ref: "#/components/responses/EchoBodyTooLarge"

  /status/{code}:
    get:
      operationId: getStatus
      tags:
        - Status
      summary: Return a given HTTP status code
      description: >
        Responds with the HTTP status code provided in the path. The code must
        be a valid HTTP status code in the range 100-599; any other value yields
        a 400 response.
      parameters:
        - name: code
          in: path
          required: true
          description: The HTTP status code to return (100-599).
          schema:
            type: integer
            format: int32
            minimum: 100
            maximum: 599
            example: 200
      responses:
        default:
          description: The HTTP status code requested by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "400":
          description: The requested status code is outside the valid range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /delay/{seconds}:
    get:
      operationId: getDelay
      tags:
        - Latency
      summary: Delay the response by a given number of seconds
      description: >
        Waits for the requested number of seconds before responding. The delay
        is capped at 10 seconds; larger values are clamped to the cap. Negative
        values yield a 400 response. The wait respects request cancellation and
        the server's request timeout.
      parameters:
        - name: seconds
          in: path
          required: true
          description: The number of seconds to delay (0-10).
          schema:
            type: number
            format: double
            minimum: 0
            maximum: 10
            example: 1
      responses:
        "200":
          description: The response after the requested delay.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelayResponse"
        "400":
          description: The requested delay is negative.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: postAuthRegister
      tags:
        - Auth
      summary: Register a new user
      description: >
        Creates a user with the given username and password and opens an
        authenticated session: the response sets the session and CSRF cookies.
        A starter account is created for the new user in the same transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: >
            The user was created and a session was opened. The session and CSRF
            cookies are set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Sets the session and CSRF cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: The request body is missing or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: The username is already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: postAuthLogin
      tags:
        - Auth
      summary: Log in with username and password
      description: >
        Verifies the credentials and opens an authenticated session: the
        response sets the session and CSRF cookies. A successful login rotates
        the session, issuing a fresh session id and CSRF token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: >
            The credentials were valid and a session was opened. The session and
            CSRF cookies are set via Set-Cookie.
          headers:
            Set-Cookie:
              description: Sets the session and CSRF cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: The request body is missing or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: The username or password is incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: >
            Too many failed login attempts. The account or client is temporarily
            locked; retry after the period indicated by the Retry-After header.
          headers:
            Retry-After:
              description: Seconds to wait before retrying.
              schema:
                type: integer
                format: int32
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: postAuthLogout
      tags:
        - Auth
      summary: Log out of the current session
      description: >
        Deletes the current session and clears the session and CSRF cookies.
        Requires a valid session cookie and a matching X-CSRF-Token header.
      parameters:
        - $ref: "#/components/parameters/CsrfTokenHeader"
      responses:
        "204":
          description: >
            The session was deleted and the session and CSRF cookies were
            cleared via Set-Cookie.
          headers:
            Set-Cookie:
              description: Clears the session and CSRF cookies.
              schema:
                type: string
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The CSRF token is missing or does not match the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getAuthMe
      tags:
        - Auth
      summary: Return the current authenticated user
      description: >
        Returns the user associated with the current session. Requires a valid
        session cookie.
      responses:
        "200":
          description: The current authenticated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password/change:
    post:
      operationId: postAuthPasswordChange
      tags:
        - Auth
      summary: Change the current user's password
      description: >
        Verifies the current password and sets a new one for the authenticated
        user. On success the session is rotated (a fresh session id and CSRF
        token are issued via Set-Cookie) and all other sessions for the user are
        revoked. Requires a valid session cookie and a matching X-CSRF-Token
        header.
      parameters:
        - $ref: "#/components/parameters/CsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
      responses:
        "200":
          description: >
            The password was changed and the session was rotated. The session
            and CSRF cookies are refreshed via Set-Cookie.
          headers:
            Set-Cookie:
              description: Refreshes the session and CSRF cookies.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: The request body is missing or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >
            The CSRF token is missing or does not match the session, or the
            current password is incorrect.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password/reset-request:
    post:
      operationId: postAuthPasswordResetRequest
      tags:
        - Auth
      summary: Request a password-reset token
      description: >
        Issues a single-use, expiring password-reset token for the given
        username. To avoid leaking which usernames exist, the response is always
        200 regardless of whether the user exists. In production the token would
        be emailed; for this demo it is returned in the response body when the
        user exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequestRequest"
      responses:
        "200":
          description: >
            The request was accepted. When the user exists, a reset token is
            included in the response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResponse"
        "400":
          description: The request body is missing or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password/reset:
    post:
      operationId: postAuthPasswordReset
      tags:
        - Auth
      summary: Reset a password using a reset token
      description: >
        Consumes a single-use reset token and sets a new password for the
        associated user. The token is invalidated on use and all of the user's
        sessions are revoked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "200":
          description: The password was reset.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: The request body is missing or malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: The reset token is unknown, expired, or already used.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags:
        - Admin
      summary: List all users
      description: >
        Returns every user (id, username, role, and creation time). Requires a
        valid session whose user has the `admin` role.
      responses:
        "200":
          description: The list of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The session user is not an administrator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/unlock:
    post:
      operationId: postAdminUserUnlock
      tags:
        - Admin
      summary: Clear a user's login lockout
      description: >
        Clears the brute-force failure counter and lock for the given user so
        they can log in again. IP-scoped locks are not affected. Requires a
        valid admin session and a matching X-CSRF-Token header.
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/CsrfTokenHeader"
      responses:
        "204":
          description: The user's login lockout was cleared.
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >
            The session user is not an administrator, or the X-CSRF-Token is
            missing or does not match the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No user matches the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users/{id}/password-reset:
    post:
      operationId: postAdminUserPasswordReset
      tags:
        - Admin
      summary: Issue a password-reset token for a user
      description: >
        Mints a single-use, expiring password-reset token for the given user.
        In production the token would be emailed; for this demo it is returned
        in the response body. Requires a valid admin session and a matching
        X-CSRF-Token header.
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
        - $ref: "#/components/parameters/CsrfTokenHeader"
      responses:
        "200":
          description: A reset token was issued for the user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >
            The session user is not an administrator, or the X-CSRF-Token is
            missing or does not match the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No user matches the given id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/accounts:
    get:
      operationId: getAdminAccounts
      tags:
        - Admin
      summary: List all accounts
      description: >
        Returns every account across all users, joined to the owner's username.
        Requires a valid session whose user has the `admin` role.
      responses:
        "200":
          description: The list of accounts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The session user is not an administrator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/transfers:
    get:
      operationId: getAdminTransfers
      tags:
        - Admin
      summary: List the transfers ledger
      description: >
        Returns the transfers ledger (most recent first), joined to the source
        and destination account names. Requires a valid session whose user has
        the `admin` role.
      responses:
        "200":
          description: The transfers ledger.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferListResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: The session user is not an administrator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /accounts:
    get:
      operationId: getAccounts
      tags:
        - Database
      summary: List all accounts
      description: >
        Returns every account across all users (id, owner username, name, and
        balance) so a transfer source and destination can be chosen. Requires a
        valid session; any authenticated user may call it.
      responses:
        "200":
          description: The list of accounts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transfer:
    post:
      operationId: postTransfer
      tags:
        - Database
      summary: Transfer funds between two accounts
      description: >
        Moves the requested amount from the source account to the destination
        account inside a single transaction. The caller must own the source
        account. The transaction runs at the chosen isolation level
        (serializable by default) and retries automatically on serialization
        conflicts. Requires a valid session and a matching X-CSRF-Token header.
      parameters:
        - $ref: "#/components/parameters/CsrfTokenHeader"
        - $ref: "#/components/parameters/IsolationQuery"
        - $ref: "#/components/parameters/HoldMsQuery"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequest"
      responses:
        "200":
          description: The transfer committed; the resulting balances are returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResult"
        "400":
          description: >
            The request body is missing or malformed, the amount is not
            positive, or the source and destination are the same account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: No valid session is present.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: >
            The caller does not own the source account, or the X-CSRF-Token is
            missing or does not match the session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The source or destination account does not exist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: >
            The source account has insufficient funds, or the transfer could not
            commit after exhausting the serialization-retry budget.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    CsrfTokenHeader:
      name: X-CSRF-Token
      in: header
      required: false
      description: >
        The CSRF token from the devopsbin_csrf cookie. Required in practice on
        state-changing requests to authenticated routes; a missing or
        mismatched token yields a 403 response. Must match the token bound to
        the current session.
      schema:
        type: string
      example: 9f1c2a7b6e4d4f0a8c3b1d2e5f6a7b8c

    UserIdPath:
      name: id
      in: path
      required: true
      description: The unique identifier of the user.
      schema:
        type: string
        format: uuid
      example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed

    IsolationQuery:
      name: isolation
      in: query
      required: false
      description: >
        The transaction isolation level for the transfer. Defaults to
        `serializable` when omitted.
      schema:
        type: string
        enum:
          - serializable
          - repeatable-read
          - read-committed
        default: serializable
      example: serializable

    HoldMsQuery:
      name: holdMs
      in: query
      required: false
      description: >
        Optional delay, in milliseconds, applied inside the transaction after
        locking the accounts. Used to widen the contention window and
        demonstrate isolation and serialization retries under concurrency.
      schema:
        type: integer
        format: int32
        minimum: 0
        maximum: 5000
        default: 0
      example: 0

  requestBodies:
    EchoBody:
      description: >
        An optional request body to reflect back. The body is read as plain
        text and echoed verbatim, up to 64 KiB.
      required: false
      content:
        text/plain:
          schema:
            type: string
            example: hello

  responses:
    EchoReflection:
      description: A reflection of the incoming request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EchoResponse"
    EchoBodyTooLarge:
      description: The request body exceeds the maximum size that can be echoed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LivezResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
          example: ok

    ReadyzResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ready
            - not_ready
          example: ready
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DependencyCheck"
          example:
            postgres:
              status: ok
            redis:
              status: ok
            migrations:
              status: ok

    StartupzResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - started
            - starting
          example: started
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DependencyCheck"
          example:
            config:
              status: ok
            migrations:
              status: ok

    DependencyCheck:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - error
            - skipped
          example: ok
        message:
          type: string
          example: dependency is healthy

    VersionResponse:
      type: object
      additionalProperties: false
      required:
        - service
        - version
        - git_sha
        - build_time
        - go_version
      properties:
        service:
          type: string
          example: devopsbin-api
        version:
          type: string
          example: 0.1.0
        git_sha:
          type: string
          example: abc123
        build_time:
          type: string
          format: date-time
          example: "2026-06-06T10:00:00Z"
        go_version:
          type: string
          example: go1.24.4

    UuidResponse:
      type: object
      additionalProperties: false
      required:
        - uuid
      properties:
        uuid:
          type: string
          format: uuid
          description: A randomly generated version 4 UUID.
          example: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed

    IpResponse:
      type: object
      additionalProperties: false
      required:
        - origin
      properties:
        origin:
          type: string
          description: The caller's origin IP address.
          example: 203.0.113.42

    HeadersResponse:
      type: object
      additionalProperties: false
      required:
        - headers
      properties:
        headers:
          $ref: "#/components/schemas/HeaderMap"

    UserAgentResponse:
      type: object
      additionalProperties: false
      required:
        - user-agent
      properties:
        user-agent:
          type: string
          example: curl/8.7.1

    SchemeResponse:
      type: object
      additionalProperties: false
      required:
        - scheme
      properties:
        scheme:
          type: string
          enum:
            - http
            - https
          description: The scheme (http or https) of the incoming request.
          example: https

    EchoResponse:
      type: object
      additionalProperties: false
      required:
        - method
        - path
        - query
        - headers
        - origin
        - scheme
      properties:
        method:
          type: string
          example: GET
        path:
          type: string
          example: /api/v1/echo
        query:
          $ref: "#/components/schemas/HeaderMap"
        headers:
          $ref: "#/components/schemas/HeaderMap"
        origin:
          type: string
          description: The caller's origin IP address.
          example: 203.0.113.42
        scheme:
          type: string
          enum:
            - http
            - https
          description: The scheme (http or https) of the incoming request.
          example: https
        body:
          type: string
          nullable: true
          description: >
            The request body echoed back verbatim. Null for methods that carry
            no body (such as GET).
          example: hello

    HeaderMap:
      type: object
      description: >
        A mapping of names to their list of values, used for both HTTP headers
        and query parameters (each may appear more than once).
      additionalProperties:
        type: array
        items:
          type: string
      example:
        Accept:
          - application/json
        User-Agent:
          - curl/8.7.1

    StatusResponse:
      type: object
      additionalProperties: false
      required:
        - code
      properties:
        code:
          type: integer
          format: int32
          description: The HTTP status code returned.
          example: 200
        description:
          type: string
          description: The canonical reason phrase for the status code, if known.
          example: OK

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - error
      properties:
        error:
          type: string
          description: A human-readable description of the error.
          example: status code must be in the range 100-599

    DelayResponse:
      type: object
      additionalProperties: false
      required:
        - delay
      properties:
        delay:
          type: number
          format: double
          description: The number of seconds the response was delayed.
          example: 1

    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          description: The unique username for the new account.
          example: alice
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: The account password (stored only as a bcrypt hash).
          example: alicepass

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: The account username.
          example: alice
        password:
          type: string
          format: password
          description: The account password.
          example: alicepass

    UserResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
      properties:
        id:
          type: string
          format: uuid
          description: The user's unique identifier.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        username:
          type: string
          description: The user's username.
          example: alice
        role:
          type: string
          enum:
            - user
            - admin
          description: The user's role.
          example: user

    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
          description: The account's current password, re-verified before the change.
          example: alicepass
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: The new password (stored only as a bcrypt hash).
          example: alicepass2

    PasswordResetRequestRequest:
      type: object
      additionalProperties: false
      required:
        - username
      properties:
        username:
          type: string
          description: The username to issue a reset token for.
          example: alice

    PasswordResetResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: A human-readable acknowledgement.
          example: If the user exists, a reset token has been issued.
        token:
          type: string
          description: >
            The single-use reset token, present only when the user exists. In
            production this would be emailed instead of returned.
          example: 7Qy3w8Zk1pT0nB2cR4sV6xA9dE5fG1hJ3kL7mN0pQ

    PasswordResetRequest:
      type: object
      additionalProperties: false
      required:
        - token
        - newPassword
      properties:
        token:
          type: string
          description: The single-use reset token issued by /auth/password/reset-request.
          example: 7Qy3w8Zk1pT0nB2cR4sV6xA9dE5fG1hJ3kL7mN0pQ
        newPassword:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: The new password (stored only as a bcrypt hash).
          example: alicepass2

    MessageResponse:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          description: A human-readable acknowledgement.
          example: Password has been reset.

    AdminUser:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - role
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: The user's unique identifier.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        username:
          type: string
          description: The user's username.
          example: alice
        role:
          type: string
          enum:
            - user
            - admin
          description: The user's role.
          example: user
        createdAt:
          type: string
          format: date-time
          description: When the user was created.
          example: "2025-01-15T09:30:00Z"

    UserListResponse:
      type: object
      additionalProperties: false
      required:
        - users
      properties:
        users:
          type: array
          description: All users, ordered by creation time.
          items:
            $ref: "#/components/schemas/AdminUser"

    AdminAccount:
      type: object
      additionalProperties: false
      required:
        - id
        - ownerUsername
        - name
        - balanceCents
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: The account's unique identifier.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        ownerUsername:
          type: string
          description: The username of the account owner.
          example: alice
        name:
          type: string
          description: The account name.
          example: Checking
        balanceCents:
          type: integer
          format: int64
          description: The account balance in cents.
          example: 100000
        createdAt:
          type: string
          format: date-time
          description: When the account was created.
          example: "2025-01-15T09:30:00Z"

    AccountListResponse:
      type: object
      additionalProperties: false
      required:
        - accounts
      properties:
        accounts:
          type: array
          description: All accounts across users, ordered by owner then account id.
          items:
            $ref: "#/components/schemas/AdminAccount"

    AdminTransfer:
      type: object
      additionalProperties: false
      required:
        - id
        - fromAccountId
        - fromAccountName
        - toAccountId
        - toAccountName
        - amountCents
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: The transfer's unique identifier.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        fromAccountId:
          type: string
          format: uuid
          description: The source account id.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        fromAccountName:
          type: string
          description: The source account name.
          example: Checking
        toAccountId:
          type: string
          format: uuid
          description: The destination account id.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bee
        toAccountName:
          type: string
          description: The destination account name.
          example: Savings
        amountCents:
          type: integer
          format: int64
          description: The transfer amount in cents.
          example: 2500
        createdAt:
          type: string
          format: date-time
          description: When the transfer was recorded.
          example: "2025-01-15T09:30:00Z"

    TransferListResponse:
      type: object
      additionalProperties: false
      required:
        - transfers
      properties:
        transfers:
          type: array
          description: The transfers ledger, most recent first.
          items:
            $ref: "#/components/schemas/AdminTransfer"

    TransferRequest:
      type: object
      additionalProperties: false
      required:
        - fromAccountId
        - toAccountId
        - amountCents
      properties:
        fromAccountId:
          type: string
          format: uuid
          description: The source account id; must be owned by the caller.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        toAccountId:
          type: string
          format: uuid
          description: The destination account id.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bee
        amountCents:
          type: integer
          format: int64
          minimum: 1
          description: The amount to transfer, in cents; must be positive.
          example: 2500

    TransferResult:
      type: object
      additionalProperties: false
      required:
        - transferId
        - fromAccountId
        - toAccountId
        - fromBalanceCents
        - toBalanceCents
        - amountCents
        - attempts
        - createdAt
      properties:
        transferId:
          type: string
          format: uuid
          description: The unique identifier of the recorded transfer.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bef
        fromAccountId:
          type: string
          format: uuid
          description: The source account id.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bed
        toAccountId:
          type: string
          format: uuid
          description: The destination account id.
          example: 018f9d6b-cbbf-7b2d-9b5d-ab8dfbbd4bee
        fromBalanceCents:
          type: integer
          format: int64
          description: The source account balance, in cents, after the transfer.
          example: 97500
        toBalanceCents:
          type: integer
          format: int64
          description: The destination account balance, in cents, after the transfer.
          example: 102500
        amountCents:
          type: integer
          format: int64
          description: The amount transferred, in cents.
          example: 2500
        attempts:
          type: integer
          format: int32
          description: >
            The number of transaction attempts made, including serialization
            retries.
          example: 1
        createdAt:
          type: string
          format: date-time
          description: When the transfer was recorded.
          example: "2025-01-15T09:30:00Z"
