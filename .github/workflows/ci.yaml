name: DevOpsBin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # 'edited' so a PR title change re-runs the conventional-commit check.
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The PR title becomes the squash-merge commit subject, so enforce the
  # Conventional Commits format on it.
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: jdx/mise-action@v4.1.0
        with:
          # Pin the mise CLI to match MISE_VERSION in mise.toml and the
          # Dockerfile so local, CI, and image builds resolve tasks and tools
          # identically.
          version: 2026.6.1
          install: true
          cache: true

      # Provides a docker-container builder so the dev image build can export
      # and import the type=local BuildKit cache (the default docker driver
      # cannot). Mirrors the default builder used on dev hosts.
      - uses: docker/setup-buildx-action@v4.1.0

      # mise-action caches the toolchains themselves; these cache the package
      # and build artifacts so dependency downloads and recompiles are reused.

      # Module cache is deterministic by go.sum, so an exact-key match restores
      # everything and there is nothing new to save.
      - name: Cache Go modules
        uses: actions/cache@v5.0.5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gomod-

      # Build cache holds incremental compiler output. Keying it only on go.sum
      # would freeze it: an exact-key match restores but never re-saves, so
      # later commits keep recompiling from a stale baseline and discard the
      # fresh output. The per-commit suffix makes every run save a new snapshot;
      # restore-keys fall back to the most recent prior cache for incremental
      # reuse.
      - name: Cache Go build
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-gobuild-${{ hashFiles('go.sum') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gobuild-${{ hashFiles('go.sum') }}-
            ${{ runner.os }}-gobuild-

      # golangci-lint keeps its own analysis cache (separate from the Go build
      # cache) under ~/.cache/golangci-lint. Persisting it lets repeat lint runs
      # reuse prior analysis instead of recomputing from scratch. Keyed on the
      # linter version (pinned in mise.toml), its config and go.sum since any of
      # those changes the analysis; the per-commit suffix lets each run save a
      # fresh snapshot and restore-keys fall back to the most recent one.
      - name: Cache golangci-lint
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-${{ hashFiles('mise.toml', '.golangci.yml', 'go.sum') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-golangci-${{ hashFiles('mise.toml', '.golangci.yml', 'go.sum') }}-
            ${{ runner.os }}-golangci-

      - name: Cache bun packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # BuildKit layer cache for the dev image built by the smoke test. Keyed on
      # the Dockerfile and dependency manifests so it invalidates when the build
      # inputs change, with a prefix fallback for partial reuse. The dev image is
      # a different build graph from the multi-platform release image, so it gets
      # its own key to avoid the two jobs evicting each other's cache.
      - name: Cache Docker buildx layers
        uses: actions/cache@v5.0.5
        with:
          path: .cache/buildx
          key: ${{ runner.os }}-buildx-dev-${{ hashFiles('Dockerfile', 'go.sum', '**/bun.lock', 'mise.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-dev-

      - name: Generate OpenAPI code for frontend
        run: mise run web:generate && git diff --exit-code .

      - name: Run frontend formatters
        run: mise run web:format:check

      - name: Run frontend linters
        run: mise run web:lint

      - name: Type-check frontend code
        run: mise run web:check

      - name: Run frontend unit tests
        run: mise run web:test

      - name: Build frontend assets
        run: mise run web:build

      - name: Run backend formatters
        run: mise run api:format && git diff --exit-code .

      - name: Generate OpenAPI code for backend
        run: mise run api:generate && git diff --exit-code .

      - name: Run backend linters
        run: mise run api:lint

      - name: Scan backend for vulnerabilities
        run: mise run api:vulncheck

      - name: Run unit tests
        run: mise run api:test:unit

      - name: Run integration tests
        run: mise --env test run api:test:integration

      - name: Build and smoke test binary
        run: |
          mise run api:build
          ./bin/devopsbin --version

      # Resolves the build version for the artifact names (the on-disk binary
      # name stays stable; upload-artifact compresses the contents).
      - name: Resolve build version
        if: github.event_name == 'pull_request'
        id: meta
        run: echo "version=$(mise env --json | jq -r .VERSION)" >> "$GITHUB_OUTPUT"

      # Cross-compile the release binaries for the supported Linux platforms and
      # upload each as its own artifact (named with the platform and version).
      - name: Cross-build release binaries
        if: github.event_name == 'pull_request'
        run: |
          for platform in linux/amd64 linux/arm64; do
            os="${platform%/*}"
            arch="${platform#*/}"
            mise run api:build \
              --os "$os" --arch "$arch" \
              --output "bin/devopsbin-${os}-${arch}"
          done

      - name: Upload linux/amd64 binary artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: devopsbin-linux-amd64-${{ steps.meta.outputs.version }}
          path: bin/devopsbin-linux-amd64
          if-no-files-found: error

      - name: Upload linux/arm64 binary artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: devopsbin-linux-arm64-${{ steps.meta.outputs.version }}
          path: bin/devopsbin-linux-arm64
          if-no-files-found: error

      - name: Smoke test the Compose dev profile
        run: mise run smoke:dev

  # Builds the multi-platform container image. On pull requests it exports an
  # OCI archive (validation, no registry); on pushes to main it pushes the
  # manifest to GHCR. Runs only after the checks above pass.
  docker:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: jdx/mise-action@v4.1.0
        with:
          # Pin the mise CLI to match MISE_VERSION in mise.toml and the
          # Dockerfile so local, CI, and image builds resolve tasks and tools
          # identically.
          version: 2026.6.1
          install: true
          cache: true

      # Provides a docker-container builder so docker:build can export/import
      # the type=local BuildKit cache (the default docker driver cannot).
      - uses: docker/setup-buildx-action@v4.1.0

      # BuildKit layer cache for the multi-platform release image, kept separate
      # from the check job's dev-image cache so the two build graphs don't evict
      # each other.
      - name: Cache Docker buildx layers
        uses: actions/cache@v5.0.5
        with:
          path: .cache/buildx
          key: ${{ runner.os }}-buildx-release-${{ hashFiles('Dockerfile', 'go.sum', '**/bun.lock', 'mise.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-release-

      # Lint the Dockerfile before building it.
      - name: Lint Dockerfile
        run: mise run docker:hadolint

      # Resolves the build version (and image reference) once for the steps
      # below. VERSION names the uploaded artifact and the pushed image tags.
      - name: Resolve build metadata
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "version=$(mise env --json | jq -r .VERSION)" >> "$GITHUB_OUTPUT"

      # Pull requests: build the multi-platform image and export an OCI archive
      # without contacting a registry.
      - name: Build OCI image
        if: github.event_name == 'pull_request'
        run: mise run docker:build

      - name: Upload OCI image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.1
        with:
          # VERSION lives in the artifact name (upload-artifact compresses the
          # contents), so the on-disk filename stays stable.
          name: devopsbin-oci-${{ steps.meta.outputs.version }}
          path: dist/devopsbin.oci.tar
          if-no-files-found: error

      # Pushes to main: authenticate to GHCR and push :latest and :<version>.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.event_name == 'push'
        run: |
          mise run docker:build --push \
            --image "${{ steps.meta.outputs.image }}" \
            --tag "${{ steps.meta.outputs.version }}" \
            --tag latest
