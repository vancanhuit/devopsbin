name: DevOpsBin CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # 'edited' so a PR title change re-runs the conventional-commit check.
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The PR title becomes the squash-merge commit subject, so enforce the
  # Conventional Commits format on it.
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: jdx/mise-action@v4.1.0
        with:
          install: true
          cache: true

      # Provides a docker-container builder so the dev image build can export
      # and import the type=local BuildKit cache (the default docker driver
      # cannot). Mirrors the default builder used on dev hosts.
      - uses: docker/setup-buildx-action@v4.1.0

      # mise-action caches the toolchains themselves; these cache the package
      # and build artifacts so dependency downloads and recompiles are reused.
      - name: Cache Go modules and build cache
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Cache bun packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # BuildKit layer cache for the dev image built by the smoke test. Keyed on
      # the Dockerfile and dependency manifests so it invalidates when the build
      # inputs change, with a prefix fallback for partial reuse.
      - name: Cache Docker buildx layers
        uses: actions/cache@v5.0.5
        with:
          path: .cache/buildx
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile', 'go.sum', '**/bun.lock', 'mise.lock') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Generate OpenAPI code for frontend
        run: mise run web:generate && git diff --exit-code .

      - name: Run frontend formatters
        run: mise run web:format:check

      - name: Run frontend linters
        run: mise run web:lint

      - name: Type-check frontend code
        run: mise run web:check

      - name: Build frontend assets
        run: mise run web:build

      - name: Run backend formatters
        run: mise run api:format && git diff --exit-code .

      - name: Generate OpenAPI code for backend
        run: mise run api:generate && git diff --exit-code .

      - name: Run backend linters
        run: mise run api:lint

      - name: Run unit tests
        run: mise run api:test:unit

      - name: Run integration tests
        run: mise --env test run api:test:integration

      - name: Build binary
        run: |
          mise run api:build
          ./bin/devopsbin --version

      - name: Smoke test the Compose dev profile
        run: mise run smoke:dev
