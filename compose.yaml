x-postgres-base: &postgres-base
  image: postgres:18.4-trixie
  environment:
    POSTGRES_USER: devopsbin
    POSTGRES_PASSWORD: devopsbin
    POSTGRES_DB: devopsbin
  healthcheck:
    test: ["CMD", "pg_isready", "-U", "devopsbin"]
    interval: 10s
    timeout: 5s
    retries: 5

x-redis-base: &redis-base
  image: redis:8.8.0-trixie
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres-test:
    <<: *postgres-base
    profiles:
      - test
    ports:
      - "5433:5432"
    networks:
      - test
  redis-test:
    <<: *redis-base
    profiles:
      - test
    ports:
      - "6380:6379"
    networks:
      - test

  postgres:
    <<: *postgres-base
    profiles:
      - dev
    ports:
      - "5432:5432"
    networks:
      - dev

  redis:
    <<: *redis-base
    profiles:
      - dev
    ports:
      - "6379:6379"
    networks:
      - dev

  api:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    command:
      - run
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres:5432/devopsbin?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev

networks:
  test:
  dev:
