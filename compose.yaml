x-postgres-base: &postgres-base
  image: postgres:18.4-trixie
  environment:
    POSTGRES_USER: devopsbin
    POSTGRES_PASSWORD: devopsbin
    POSTGRES_DB: devopsbin
  healthcheck:
    test: ["CMD", "pg_isready", "-U", "devopsbin"]
    interval: 10s
    timeout: 5s
    retries: 5

x-redis-base: &redis-base
  image: redis:8.8.0-trixie
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

# Shared build/run definition for every api service. Each profile's api service
# only overrides the topology-specific environment, ports, depends_on, and
# network.
x-api-base: &api-base
  # The shared image tag every api-flavoured service runs. Exactly one service
  # per Compose profile attaches the build definition below (via
  # `build: *api-build`) and produces this tag; the rest reference it and reuse
  # what that single build produced.
  image: devopsbin:${VERSION:-dev}
  command:
    - run

# Build definition for the binary image. Attached to a SINGLE service per
# profile. Compose's bake creates one build target per service that declares
# `build:`, and parallel targets exporting mode=max to the same `type=local`
# cache dir race on the cache `ingest`/`blobs` files and corrupt .cache/buildx
# (the "rename ... no such file or directory" / missing index.json errors).
# Keeping one builder per profile means a single cache writer, which is safe and
# still warms the persisted layer cache.
x-api-build: &api-build
  context: .
  dockerfile: Dockerfile
  args:
    VERSION: ${VERSION:-dev}
    COMMIT: ${COMMIT:-none}
    BUILD_TIME: ${BUILD_TIME:-unknown}
  # Persisted BuildKit layer cache so repeat builds (local and CI) reuse work.
  # Requires a docker-container builder, which is the default driver on dev
  # hosts and provisioned in CI.
  cache_from:
    - type=local,src=.cache/buildx
  cache_to:
    - type=local,dest=.cache/buildx,mode=max

# Shared definition for every profile's one-shot migration runner. Each profile
# attaches this and only overrides the topology-specific POSTGRES_URL,
# depends_on, profile, and network. The runner applies the embedded migrations
# and exits; the profile's api waits for it to complete successfully so it never
# serves against an un-migrated schema. The runner takes a Postgres session
# lock, so running it from several instances at once is safe.
x-migrate-base: &migrate-base
  <<: *api-base
  command:
    - migrate
    - up
  restart: "no"

# A Redis Cluster node: cluster mode enabled, advertising its in-network
# container address (reachable by the api on the same network). The cluster is
# formed by the redis-cluster-init one-shot once every node is healthy.
x-redis-cluster-node: &redis-cluster-node
  image: redis:8.8.0-trixie
  command:
    - redis-server
    - --cluster-enabled
    - "yes"
    - --cluster-node-timeout
    - "5000"
    - --cluster-config-file
    - nodes.conf
    - --appendonly
    - "yes"
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

# A Redis replica that follows redis-master (used by the sentinel topology).
x-redis-replica: &redis-replica
  image: redis:8.8.0-trixie
  command:
    - redis-server
    - --appendonly
    - "yes"
    - --replicaof
    - redis-master
    - "6379"
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
  depends_on:
    redis-master:
      condition: service_healthy

# A Sentinel that monitors "mymaster". Hostname resolution is enabled so the
# monitor directive (and the address returned to clients) can use the stable
# service name redis-master rather than a volatile container IP.
x-redis-sentinel: &redis-sentinel
  image: redis:8.8.0-trixie
  command:
    - sh
    - -c
    - |
      cat > /tmp/sentinel.conf <<'CONF'
      port 26379
      sentinel resolve-hostnames yes
      sentinel announce-hostnames yes
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1
      CONF
      exec redis-server /tmp/sentinel.conf --sentinel
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "26379", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5
  depends_on:
    redis-master:
      condition: service_healthy

services:
  postgres-test:
    <<: *postgres-base
    profiles:
      - test
    ports:
      - "5433:5432"
    networks:
      - test
  redis-test:
    <<: *redis-base
    profiles:
      - test
    ports:
      - "6380:6379"
    networks:
      - test

  postgres:
    <<: *postgres-base
    profiles:
      - dev
    ports:
      - "5432:5432"
    networks:
      - dev

  redis:
    <<: *redis-base
    profiles:
      - dev
    ports:
      - "6379:6379"
    networks:
      - dev

  api:
    <<: *api-base
    # Sole builder for the dev profile; the migrate one-shot reuses this image.
    build: *api-build
    profiles:
      - dev
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres:5432/devopsbin?sslmode=disable
      REDIS_MODE: standalone
      REDIS_ADDRS: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - dev

  # One-shot that applies the database migrations and exits. The api waits for
  # it to complete successfully so it never serves against an un-migrated
  # schema. The migration runner takes a Postgres session lock, so running this
  # from several instances at once is safe.
  migrate:
    <<: *migrate-base
    profiles:
      - dev
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres:5432/devopsbin?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev

  # --- cluster profile: api + Postgres + a 3-master/3-replica Redis Cluster ---
  postgres-cluster:
    <<: *postgres-base
    profiles:
      - cluster
    networks:
      - cluster
  redis-cluster-1:
    <<: *redis-cluster-node
    profiles:
      - cluster
    networks:
      - cluster
  redis-cluster-2:
    <<: *redis-cluster-node
    profiles:
      - cluster
    networks:
      - cluster
  redis-cluster-3:
    <<: *redis-cluster-node
    profiles:
      - cluster
    networks:
      - cluster
  redis-cluster-4:
    <<: *redis-cluster-node
    profiles:
      - cluster
    networks:
      - cluster
  redis-cluster-5:
    <<: *redis-cluster-node
    profiles:
      - cluster
    networks:
      - cluster
  redis-cluster-6:
    <<: *redis-cluster-node
    profiles:
      - cluster
    networks:
      - cluster
  # One-shot that forms the cluster (3 masters + 1 replica each) once every
  # node is healthy, then exits. The api waits for it to complete successfully.
  redis-cluster-init:
    image: redis:8.8.0-trixie
    profiles:
      - cluster
    restart: "no"
    command:
      - redis-cli
      - --cluster
      - create
      - redis-cluster-1:6379
      - redis-cluster-2:6379
      - redis-cluster-3:6379
      - redis-cluster-4:6379
      - redis-cluster-5:6379
      - redis-cluster-6:6379
      - --cluster-replicas
      - "1"
      - --cluster-yes
    depends_on:
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
      redis-cluster-3:
        condition: service_healthy
      redis-cluster-4:
        condition: service_healthy
      redis-cluster-5:
        condition: service_healthy
      redis-cluster-6:
        condition: service_healthy
    networks:
      - cluster
  # One-shot that applies the database migrations for the cluster profile and
  # exits; api-cluster waits for it to complete successfully.
  migrate-cluster:
    <<: *migrate-base
    profiles:
      - cluster
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-cluster:5432/devopsbin?sslmode=disable
    depends_on:
      postgres-cluster:
        condition: service_healthy
    networks:
      - cluster
  api-cluster:
    <<: *api-base
    # Sole builder for the cluster profile.
    build: *api-build
    profiles:
      - cluster
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-cluster:5432/devopsbin?sslmode=disable
      REDIS_MODE: cluster
      REDIS_ADDRS: redis-cluster-1:6379,redis-cluster-2:6379,redis-cluster-3:6379,redis-cluster-4:6379,redis-cluster-5:6379,redis-cluster-6:6379
    ports:
      - "8080:8080"
    depends_on:
      postgres-cluster:
        condition: service_healthy
      migrate-cluster:
        condition: service_completed_successfully
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - cluster

  # --- sentinel profile: api + Postgres + master/replica Redis + 3 Sentinels --
  postgres-sentinel:
    <<: *postgres-base
    profiles:
      - sentinel
    networks:
      - sentinel
  redis-master:
    <<: *redis-base
    profiles:
      - sentinel
    command:
      - redis-server
      - --appendonly
      - "yes"
    networks:
      - sentinel
  redis-replica-1:
    <<: *redis-replica
    profiles:
      - sentinel
    networks:
      - sentinel
  redis-replica-2:
    <<: *redis-replica
    profiles:
      - sentinel
    networks:
      - sentinel
  redis-sentinel-1:
    <<: *redis-sentinel
    profiles:
      - sentinel
    networks:
      - sentinel
  redis-sentinel-2:
    <<: *redis-sentinel
    profiles:
      - sentinel
    networks:
      - sentinel
  redis-sentinel-3:
    <<: *redis-sentinel
    profiles:
      - sentinel
    networks:
      - sentinel
  # One-shot that applies the database migrations for the sentinel profile and
  # exits; api-sentinel waits for it to complete successfully.
  migrate-sentinel:
    <<: *migrate-base
    profiles:
      - sentinel
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-sentinel:5432/devopsbin?sslmode=disable
    depends_on:
      postgres-sentinel:
        condition: service_healthy
    networks:
      - sentinel
  api-sentinel:
    <<: *api-base
    # Sole builder for the sentinel profile.
    build: *api-build
    profiles:
      - sentinel
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-sentinel:5432/devopsbin?sslmode=disable
      REDIS_MODE: sentinel
      REDIS_MASTER_NAME: mymaster
      REDIS_ADDRS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
    ports:
      - "8080:8080"
    depends_on:
      postgres-sentinel:
        condition: service_healthy
      migrate-sentinel:
        condition: service_completed_successfully
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
    networks:
      - sentinel

  # --- tls profile: direct-HTTPS api + Caddy-terminated reverse proxy ---------
  # Exercises two TLS topologies against the same binary: api-tls-direct serves
  # HTTPS itself (cert/key from config), while api-tls-proxied stays plain HTTP
  # behind Caddy, which terminates TLS and forwards X-Forwarded-* headers. The
  # network pins an explicit subnet and Caddy a static address so the proxied
  # api can trust exactly that peer via HTTP_TRUSTED_PROXIES.
  postgres-tls:
    <<: *postgres-base
    profiles:
      - tls
    networks:
      - tls
  redis-tls:
    <<: *redis-base
    profiles:
      - tls
    networks:
      - tls

  # One-shot that applies the database migrations for the tls profile and exits;
  # both api-tls-direct and api-tls-proxied wait for it to complete
  # successfully.
  migrate-tls:
    <<: *migrate-base
    profiles:
      - tls
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-tls:5432/devopsbin?sslmode=disable
    depends_on:
      postgres-tls:
        condition: service_healthy
    networks:
      - tls

  api-tls-direct:
    <<: *api-base
    # Sole builder for the tls profile; api-tls-proxied reuses this image.
    build: *api-build
    profiles:
      - tls
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-tls:5432/devopsbin?sslmode=disable
      REDIS_MODE: standalone
      REDIS_ADDRS: redis-tls:6379
      HTTP_ADDR: ":8443"
      HTTP_TLS_CERT_FILE: /certs/devopsbin.pem
      HTTP_TLS_KEY_FILE: /certs/devopsbin-key.pem
    volumes:
      # tls/dev for the local `compose:tls:up` stack; smoke overrides this to
      # tls/test via TLS_CERTS_DIR (see `compose:tls:test:up`).
      - ${TLS_CERTS_DIR:-./tls/dev}:/certs:ro
    ports:
      - "8443:8443"
    # The image's default healthcheck probes plain HTTP on :8080; override it to
    # verify the chain against the mkcert CA, mirroring production behaviour with
    # a private CA (no -insecure).
    healthcheck:
      test:
        - CMD
        - /devopsbin
        - healthcheck
        - --url
        - https://127.0.0.1:8443/api/v1/livez
        - --cacert
        - /certs/rootCA.pem
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres-tls:
        condition: service_healthy
      migrate-tls:
        condition: service_completed_successfully
      redis-tls:
        condition: service_healthy
    networks:
      - tls

  api-tls-proxied:
    <<: *api-base
    profiles:
      - tls
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-tls:5432/devopsbin?sslmode=disable
      REDIS_MODE: standalone
      REDIS_ADDRS: redis-tls:6379
      # Trust only Caddy's static address (below). Forwarded headers from any
      # other peer are ignored, so a direct caller cannot spoof its client IP.
      HTTP_TRUSTED_PROXIES: 172.16.7.10/32
    depends_on:
      postgres-tls:
        condition: service_healthy
      migrate-tls:
        condition: service_completed_successfully
      redis-tls:
        condition: service_healthy
    # No host port: reachable only through Caddy.
    networks:
      - tls

  caddy:
    image: caddy:2.11.4
    profiles:
      - tls
    volumes:
      - ./tls/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${TLS_CERTS_DIR:-./tls/dev}:/certs:ro
    ports:
      - "9443:443"
    depends_on:
      api-tls-proxied:
        condition: service_healthy
    networks:
      tls:
        ipv4_address: 172.16.7.10

  # --- mtls profile: mutual TLS between the binary and a re-encrypting proxy --
  # The binary serves HTTPS and requires a client certificate
  # (HTTP_TLS_CLIENT_CA_FILE). Caddy terminates the browser-facing TLS and then
  # re-encrypts to the backend, presenting a client certificate so the backend
  # accepts the connection. Datastores are dedicated to this profile, and the
  # network pins an explicit subnet with Caddy on a static address so the backend
  # can trust exactly that peer via HTTP_TRUSTED_PROXIES.
  postgres-mtls:
    <<: *postgres-base
    profiles:
      - mtls
    networks:
      - mtls
  redis-mtls:
    <<: *redis-base
    profiles:
      - mtls
    networks:
      - mtls

  # One-shot that applies the database migrations for the mtls profile and
  # exits; api-mtls waits for it to complete successfully.
  migrate-mtls:
    <<: *migrate-base
    profiles:
      - mtls
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-mtls:5432/devopsbin?sslmode=disable
    depends_on:
      postgres-mtls:
        condition: service_healthy
    networks:
      - mtls

  api-mtls:
    <<: *api-base
    # Sole builder for the mtls profile.
    build: *api-build
    profiles:
      - mtls
    environment:
      POSTGRES_URL: postgres://devopsbin:devopsbin@postgres-mtls:5432/devopsbin?sslmode=disable
      REDIS_MODE: standalone
      REDIS_ADDRS: redis-mtls:6379
      HTTP_ADDR: ":8443"
      HTTP_TLS_CERT_FILE: /certs/devopsbin.pem
      HTTP_TLS_KEY_FILE: /certs/devopsbin-key.pem
      # Require every client to present a certificate signed by this CA.
      HTTP_TLS_CLIENT_CA_FILE: /certs/rootCA.pem
      # Trust only Caddy's static address (below) for forwarded headers.
      HTTP_TRUSTED_PROXIES: 172.16.8.10/32
    volumes:
      # tls/dev for the local `compose:mtls:up` stack; smoke overrides this to
      # tls/test via TLS_CERTS_DIR (see `compose:mtls:test:up`).
      - ${TLS_CERTS_DIR:-./tls/dev}:/certs:ro
    ports:
      # Direct host access for the mTLS smoke probes (verifies both rejection
      # without a client cert and success with one).
      - "8444:8443"
    # Probe over mTLS: verify the server against the mkcert CA and present the
    # client certificate so RequireAndVerifyClientCert accepts the connection.
    healthcheck:
      test:
        - CMD
        - /devopsbin
        - healthcheck
        - --url
        - https://127.0.0.1:8443/api/v1/livez
        - --cacert
        - /certs/rootCA.pem
        - --cert
        - /certs/devopsbin-client.pem
        - --key
        - /certs/devopsbin-client-key.pem
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres-mtls:
        condition: service_healthy
      migrate-mtls:
        condition: service_completed_successfully
      redis-mtls:
        condition: service_healthy
    networks:
      - mtls

  caddy-mtls:
    image: caddy:2.11.4
    profiles:
      - mtls
    volumes:
      - ./tls/Caddyfile.mtls:/etc/caddy/Caddyfile:ro
      - ${TLS_CERTS_DIR:-./tls/dev}:/certs:ro
    ports:
      - "9444:443"
    depends_on:
      api-mtls:
        condition: service_healthy
    networks:
      mtls:
        ipv4_address: 172.16.8.10

networks:
  test:
  dev:
  cluster:
  sentinel:
  tls:
    ipam:
      config:
        - subnet: 172.16.7.0/24
  mtls:
    ipam:
      config:
        - subnet: 172.16.8.0/24
